<!DOCTYPE html>
<html>

<head >
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debugging Challenge Platform</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI, Arial;
margin:0;
}

header{
background:#020617;
padding:16px;
font-size:26px;
text-align:center;
font-weight:bold;
letter-spacing:1px;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.description{
font-size:20px;
font-weight:600;
margin-bottom:15px;
color:#38bdf8;
}

.message{
margin-top:15px;
font-size:18px;
color:#facc15;
}

#editor{
height:420px;
border-radius:6px;
border:1px solid #1e293b;
}

button{
padding:10px 18px;
margin:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.submit{
background:#22c55e;
color:white;
}

.reset{
background:#f59e0b;
color:white;
}

.skip{
background:#ef4444;
color:white;
}

</style>

</head>


<body>

<header>Debugging Challenge Platform</header>

<div class="container">

<div class="description">
{{description}}
</div>

{% if message %}
<div class="message">
{{message}}
</div>
{% endif %}

<form action="/submit" method="POST">

<div id="editor"></div>

<input type="hidden" name="code" id="code_input">

<br>

<button class="submit">Submit Fix</button>

</form>

<form action="/reset" method="POST" style="display:inline;">
<button class="reset">Reset</button>
</form>

<form action="/skip" method="POST" style="display:inline;">
<button class="skip">Skip</button>
</form>

</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

<script>

require.config({
paths:{
vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs"
}
});

require(["vs/editor/editor.main"], function () {

var editor = monaco.editor.create(document.getElementById("editor"),{

value:`{{ code | safe }}`,
language:"c",
theme:"vs-dark",
fontSize:16,
automaticLayout:true,
minimap:{enabled:false}

});


document.querySelector("form").addEventListener("submit",function(){

document.getElementById("code_input").value = editor.getValue();

});

});

</script>

</body>
</html>
