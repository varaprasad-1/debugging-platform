<!DOCTYPE html>
<html>

<head>

<title>Debugging Challenge Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
margin:0;
}

header{
background:#020617;
padding:20px;
font-size:28px;
text-align:center;
font-weight:bold;
border-bottom:1px solid #1e293b;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
background:#020617;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
margin-top:30px;
}

.description{
font-size:20px;
font-weight:600;
color:#38bdf8;
margin-bottom:20px;
}

.message{
color:#facc15;
margin-bottom:10px;
}

#editor{
height:450px;
border:1px solid #334155;
border-radius:8px;
}

.button-bar{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

.submit{background:#22c55e;color:white;}
.reset{background:#f59e0b;color:white;}
.skip{background:#ef4444;color:white;}

button:hover{
transform:scale(1.05);
}

.footer{
text-align:center;
padding:15px;
margin-top:20px;
color:#94a3b8;
font-size:14px;
}

</style>

</head>


<body>

<header>
Debugging Challenge Platform
</header>


<div class="container">

<div class="description">
{{description}}
</div>

{% if message %}
<div class="message">
{{message}}
</div>
{% endif %}

<form action="/submit" method="POST">

<div id="editor"></div>

<input type="hidden" name="code" id="code_input">

<div class="button-bar">

<button class="submit">Submit Fix</button>

</form>

<form action="/reset" method="POST">
<button class="reset">Reset</button>
</form>

<form action="/skip" method="POST">
<button class="skip">Skip</button>
</form>

</div>

</div>

<footer class="footer">
Created by Varaprasad Kotyada
</footer>


<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs/loader.min.js"></script>

<script>

require.config({
paths:{
vs:"https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.34.1/min/vs"
}
});

require(["vs/editor/editor.main"], function () {

var editor = monaco.editor.create(document.getElementById("editor"),{

value:`{{ code | safe }}`,
language:"c",
theme:"vs-light",
fontSize:16,
automaticLayout:true,
minimap:{enabled:false}

});


document.querySelector("form").addEventListener("submit",function(){

document.getElementById("code_input").value = editor.getValue();

});

});

</script>

</body>
</html>
